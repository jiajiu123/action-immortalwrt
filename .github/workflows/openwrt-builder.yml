#
# Build ImmortalWrt on Debian 11 while keeping host-side disk cleanup.
#

name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: "false"
  UPLOAD_FIRMWARE: "true"
  UPLOAD_RELEASE: "true"
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build on Debian 11
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Cleanup host disk
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo mkdir -p /workdir
          sudo chown "$(id -u):$(id -g)" /workdir
          df -hT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware in Debian 11
        id: compile
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker run --rm -i \
            -e DEBIAN_FRONTEND \
            -e REPO_URL \
            -e REPO_BRANCH \
            -e FEEDS_CONF \
            -e CONFIG_FILE \
            -e DIY_P1_SH \
            -e DIY_P2_SH \
            -e GITHUB_WORKSPACE \
            -e TZ \
            -e BUILDER_UID="$(id -u)" \
            -e BUILDER_GID="$(id -g)" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v /workdir:/workdir \
            -w "$GITHUB_WORKSPACE" \
            debian:11 bash -s <<'DEBIAN'
          set -e

          apt-get -qq update
          apt-get -qq install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint \
            bash binutils bison build-essential bzip2 ca-certificates ccache \
            clang cmake cpio curl device-tree-compiler ecj fastjar file flex \
            gawk gcc gcc-10 g++ g++-10 g++-multilib gcc-multilib \
            genisoimage gettext git gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp3-dev libgnutls28-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool libyaml-dev lld llvm lrzsz msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-dev \
            python3-distutils python3-docutils python3-pip python3-ply \
            python3-pyelftools python3-setuptools qemu-utils re2c rsync \
            scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev zstd
          apt-get -qq clean
          rm -rf /var/lib/apt/lists/*

          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
          ln -snf "/usr/share/zoneinfo/$TZ" /etc/localtime
          echo "$TZ" > /etc/timezone

          if ! getent group "$BUILDER_GID" >/dev/null; then
            groupadd --gid "$BUILDER_GID" builder
          fi
          useradd --uid "$BUILDER_UID" --gid "$BUILDER_GID" --create-home --shell /bin/bash builder
          chown -R "$BUILDER_UID:$BUILDER_GID" /workdir "$GITHUB_WORKSPACE" /home/builder

          cat > /usr/local/bin/as-builder <<'EOF'
          #!/usr/bin/env bash
          set -e
          export HOME=/home/builder
          export USER=builder
          export LOGNAME=builder
          exec runuser -u builder --preserve-environment -- bash -e "$@"
          EOF
          chmod +x /usr/local/bin/as-builder

          as-builder <<'BUILDER'
          echo "Disk before build:"
          df -hT / /workdir "$GITHUB_WORKSPACE"
          echo
          echo "Toolchain:"
          gcc --version | head -n 1
          g++ --version | head -n 1
          clang --version | head -n 1

          cd /workdir
          git clone --single-branch --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

          cd "$GITHUB_WORKSPACE"
          if [ -f "$FEEDS_CONF" ]; then
            mv "$FEEDS_CONF" openwrt/feeds.conf.default
          fi
          if [ -f "$DIY_P1_SH" ]; then
            chmod +x "$DIY_P1_SH"
            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          fi

          cd "$GITHUB_WORKSPACE/openwrt"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          cd "$GITHUB_WORKSPACE"
          if [ -d files ]; then
            mv files openwrt/files
          fi
          if [ -f "$CONFIG_FILE" ]; then
            mv "$CONFIG_FILE" openwrt/.config
          fi
          if [ -f "$DIY_P2_SH" ]; then
            chmod +x "$DIY_P2_SH"
            cd openwrt
            "$GITHUB_WORKSPACE/$DIY_P2_SH"
          fi

          cd "$GITHUB_WORKSPACE/openwrt"
          make defconfig
          make download -j"$(nproc)"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          df -hT "$PWD"

          echo "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 V=s
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          date +"%Y%m%d%H%M" > FILE_DATE
          df -hT "$PWD"
          BUILDER
          DEBIAN

          echo "status=success" >> "$GITHUB_OUTPUT"
          [ -s openwrt/DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat openwrt/DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(cat openwrt/FILE_DATE)" >> "$GITHUB_ENV"

      - name: Check space usage
        if: ${{ !cancelled() }}
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' }}
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: ${{ env.UPLOAD_FIRMWARE == 'true' && !cancelled() }}
        run: |
          firmware_dir="$(find "$GITHUB_WORKSPACE/openwrt/bin/targets" -mindepth 2 -maxdepth 2 -type d | head -n 1)"
          [ -n "$firmware_dir" ]
          cd "$firmware_dir"
          rm -rf packages
          echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: ${{ steps.organize.outputs.status == 'success' && !cancelled() }}
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: ${{ env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' && !cancelled() }}
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
          {
            echo "ImmortalWrt firmware build"
            echo
            echo "Repository: ${{ github.repository }}"
            echo "Source: $REPO_URL"
            echo "Branch: $REPO_BRANCH"
            echo "Build time: $(date +"%Y-%m-%d %H:%M:%S %Z")"
          } > release.txt
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: ${{ steps.tag.outputs.status == 'success' && steps.organize.outputs.status == 'success' && !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: ${{ env.UPLOAD_RELEASE == 'true' && !cancelled() }}
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
